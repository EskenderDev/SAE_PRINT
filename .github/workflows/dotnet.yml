name: .NET CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore SAE_PRINT.csproj

    - name: Build
      run: dotnet build SAE_PRINT.csproj --no-restore -c Release

    - name: Test
      run: dotnet test Tests/SAE.Print.Tests/SAE.Print.Tests.csproj --no-build -c Release --verbosity normal

    - name: Check if Version Changed
      id: check_version
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        git fetch --depth=2
        # Use git diff to see if the <Version> line changed compared to the previous commit
        if (git diff HEAD^ HEAD -- SAE_PRINT.csproj | Select-String "<Version>") {
            echo "version_changed=true" >> $env:GITHUB_OUTPUT
            Write-Host "Version changed or new. Proceeding to pack & publish."
        } else {
            echo "version_changed=false" >> $env:GITHUB_OUTPUT
            Write-Host "Version did not change. Skipping pack & publish."
        }

    - name: Pack
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.check_version.outputs.version_changed == 'true'
      run: dotnet pack SAE_PRINT.csproj --no-build -c Release -o nupkg

    - name: Push to NuGet
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.check_version.outputs.version_changed == 'true'
      env:
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
      run: |
        if ("$env:NUGET_API_KEY" -ne "") {
            dotnet nuget push nupkg/*.nupkg -k $env:NUGET_API_KEY -s https://api.nuget.org/v3/index.json --skip-duplicate
        } else {
            Write-Host "No NUGET_API_KEY found. Skipping NuGet push."
        }
